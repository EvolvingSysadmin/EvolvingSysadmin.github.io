<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <title>{{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% seo %}
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="#" class="nav__logo">rh<span class="accent">.</span></a>
      <ul class="nav__links">
        <li><a href="#about">about</a></li>
        <li><a href="#projects">projects</a></li>
        <li><a href="#certifications">certs</a></li>
        <li><a href="#site">this site</a></li>
        <li><a href="#contact">contact</a></li>
        <li><a href="/assets/resume/Ryan_Heavican_Resume.pdf" target="_blank" class="nav__resume">resume</a></li>
      </ul>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="muted">© {{ 'now' | date: '%Y' }} Ryan Heavican</span>
      <div class="footer__links">
        <a href="{{ site.author.github }}" target="_blank">GitHub</a>
        <a href="{{ site.author.linkedin }}" target="_blank">LinkedIn</a>
        <a href="mailto:{{ site.author.email }}">Email</a>
      </div>
    </div>
  </footer>

  <!-- Smooth scroll script -->
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // Add scrolled class to nav for shadow effect
    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>

</body>
</html>
